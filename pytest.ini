[pytest]
DJANGO_SETTINGS_MODULE = viaduct.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --cov=api
    --cov=search
    --cov-report=html
    --cov-report=term-missing
    --tb=short
    -p no:warnings
testpaths = tests
